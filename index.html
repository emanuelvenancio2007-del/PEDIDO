<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Uma pergunta ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Fundo de estrelas -->
    <div id="stars"></div>

    <!-- Mensagens do botão "Não" -->
    <div id="mensagem" class="mensagem"></div>

    <!-- Tela inicial -->
    <div class="container">

        <h1>❤️</h1>

        <h2>Tenho uma pergunta...</h2>

        <p>
            Antes de responder, pense com carinho. 😊
        </p>

        <h3>Você gosta do Emanuel?</h3>

        <div class="botoes">

            <button id="nao">
                Não gosto do Emanuel
            </button>

            <button id="sim">
                Eu gosto do Emanuel ❤️
            </button>

        </div>

    </div>

    <!-- Carta -->
    <div id="carta" style="display:none;">

        <div class="envelope">
            💌
        </div>

        <div class="papel">

            <h2>Para você ❤️</h2>

            <p id="textoCarta"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
